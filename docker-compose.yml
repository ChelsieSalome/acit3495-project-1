version: '3.8'
services:
  mysql:
    build: ./mysql
    container_name: mysql
    ports:
      - "3307:3306" #changed due to internal port mapping config
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: project1
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  enter-data-app:
    build: ./enter-data-app
    container_name: enter-data-app
    ports:
      - "5000:5000"
    depends_on:
      - mysql

volumes:
  mysql_data:
